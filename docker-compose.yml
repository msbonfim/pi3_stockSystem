# Dev local: PostgreSQL + Metabase (BI lê o mesmo Postgres via SQL — não via API do Django)
#
# Subir: docker compose up -d
# Metabase: http://localhost:3000  (primeiro acesso: criar admin)
# Postgres: localhost:5432
#
# Django no host (recomendado): defina no ambiente:
#   DATABASE_URL=postgresql://app:app@127.0.0.1:5432/sistema_gestao
# Depois: python manage.py migrate
#
# No Metabase → Admin → Bases de dados → adicionar Postgres:
#   Host: postgres  (nome do serviço; Metabase roda dentro do Docker)
#   Porta: 5432
#   Base: sistema_gestao
#   Utilizador: app / palavra-passe: app
#
# Em produção use utilizador só leitura; aqui é só para desenvolvimento.

services:
  postgres:
    image: postgres:16-alpine
    container_name: pi2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: sistema_gestao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-metabase-db.sql:/docker-entrypoint-initdb.d/02-init-metabase-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d sistema_gestao"]
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: pi2_metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: app
      MB_DB_PASS: app
      MB_DB_HOST: postgres

volumes:
  postgres_data:
